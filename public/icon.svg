<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background: deep navy to rich purple -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0821"/>
      <stop offset="60%" stop-color="#2e1065"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <!-- Outer flame: orange to amber -->
    <linearGradient id="flameOuter" x1="0%" y1="100%" x2="20%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Mid flame: amber to yellow -->
    <linearGradient id="flameMid" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <!-- Inner flame: white-yellow core -->
    <linearGradient id="flameCore" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Subtle star dots -->
  <circle cx="14" cy="16" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="82" cy="12" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="88" cy="32" r="1.1" fill="white" opacity="0.6"/>
  <circle cx="20" cy="42" r="0.7" fill="white" opacity="0.4"/>
  <circle cx="78" cy="58" r="0.9" fill="white" opacity="0.45"/>
  <circle cx="12" cy="68" r="0.7" fill="white" opacity="0.35"/>
  <circle cx="91" cy="72" r="1" fill="white" opacity="0.5"/>
  <circle cx="30" cy="22" r="0.6" fill="white" opacity="0.3"/>

  <!-- Ambient glow behind flame -->
  <ellipse cx="50" cy="62" rx="22" ry="14" fill="#f97316" opacity="0.15" filter="url(#softGlow)"/>

  <!-- Outer flame -->
  <path d="M50 18
    C54 26, 68 30, 66 44
    C65 52, 60 55, 62 62
    C58 56, 55 53, 56 48
    C54 54, 52 58, 50 74
    C48 58, 46 54, 44 48
    C45 53, 42 56, 38 62
    C40 55, 35 52, 34 44
    C32 30, 46 26, 50 18Z"
    fill="url(#flameOuter)" filter="url(#glow)"/>

  <!-- Mid flame -->
  <path d="M50 28
    C53 34, 62 37, 60 48
    C59 54, 56 56, 57 61
    C54 56, 52 53, 53 48
    C52 54, 51 58, 50 70
    C49 58, 48 54, 47 48
    C48 53, 46 56, 43 61
    C44 56, 41 54, 40 48
    C38 37, 47 34, 50 28Z"
    fill="url(#flameMid)"/>

  <!-- Inner core flame -->
  <path d="M50 38
    C52 43, 57 45, 56 52
    C55 57, 53 58, 54 62
    C52 58, 51 55, 51 51
    C50.5 56, 50 60, 50 68
    C50 60, 49.5 56, 49 51
    C49 55, 48 58, 46 62
    C47 58, 45 57, 44 52
    C43 45, 48 43, 50 38Z"
    fill="url(#flameCore)" opacity="0.9"/>

  <!-- Subtle road perspective lines at bottom -->
  <line x1="28" y1="88" x2="50" y2="80" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="72" y1="88" x2="50" y2="80" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
</svg>
